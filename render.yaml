# Render deploy for the Vouch backend — Docker runtime (avoids Render's corepack/pnpm
# provisioning, which fails with EROFS on the read-only /usr/bin). Single instance only.
services:
  - type: web
    name: vouch-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    numInstances: 1 # one wallet signer — multiple instances would equivocate the gas coin
    envVars:
      - key: SUI_MNEMONIC # secret — set in the Render dashboard
        sync: false
      - key: GROQ_API_KEY # secret — set in the Render dashboard
        sync: false
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
